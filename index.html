<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe 5×5 — Depth-Optimised AI</title>
  <meta name="description"
        content="Play 5×5 Tic-Tac-Toe against a depth-12 minimax AI with a precomputed 6-ply opening book. Powered by WebAssembly." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <main class="container">
    <header class="title-block">
      <h1>Tic-Tac-Toe <span class="accent">5×5</span></h1>
      <p class="subtitle" id="subtitle">Depth-12 AI · 6-ply opening book · Play as —</p>
    </header>

    <!-- Side selection screen -->
    <section class="side-select" id="side-select" aria-label="Choose your side">
      <p class="choose-label">Choose your side</p>
      <div class="side-btns">
        <button class="side-btn x-btn" id="btn-x" aria-label="Play as X (go first)">X</button>
        <button class="side-btn o-btn" id="btn-o" aria-label="Play as O (go second)">O</button>
      </div>
    </section>

    <!-- Game board -->
    <section class="board-wrap" id="board-wrap" aria-label="Game board" hidden>
      <div class="board" id="board" role="grid" aria-label="5×5 Tic-Tac-Toe board">
        <!-- 25 cells injected by app.js -->
      </div>
      <div class="status-bar" id="status-bar" aria-live="polite"></div>
      <div class="move-info" id="move-info" aria-live="polite"></div>
      <div class="settings-row">
        <label class="toggle-label" for="forced-draw-toggle"
               title="End the game immediately when no 5-in-a-row is mathematically possible for either player. Off by default — the AI can still sneak a win while you think it's hopeless!">
          <span>Detect forced draws</span>
          <span class="toggle-switch">
            <input type="checkbox" id="forced-draw-toggle" />
            <span class="toggle-knob"></span>
          </span>
        </label>
      </div>
      <button class="replay-btn" id="replay-btn" aria-label="Play again" hidden>↩ Play Again</button>
    </section>

    <footer class="footer">
      Engine: C++ Minimax · Alpha-Beta · D₈ Symmetry →
      <a href="https://webassembly.org" target="_blank" rel="noopener">WebAssembly</a>
    </footer>

    <div class="engine-status" id="engine-status" aria-live="polite">Loading engine…</div>
  </main>

  <!-- WASM engine (generated by emcc) -->
  <script src="public/engine.js?v=2"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
